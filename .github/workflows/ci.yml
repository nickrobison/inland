name: CI

on:
  push:
    branches: [master, mergegate/**]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        java: [21, 25]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - run: sbt test
